<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
  <!-- Soft-rounded cursor: Slightly rounded arrow with softer edges -->
  <!-- Filters are not allowed in cursor SVGs - use stroke-linejoin instead -->
  <!-- Shadow for depth -->
  <path d="M4 3 L4 19 L8 15 L12 21 L14 20 L10 14 L16 14 Z"
        fill="rgba(0,0,0,0.15)"
        transform="translate(1, 1)"
        stroke-linejoin="round"
        stroke-linecap="round"/>
  <!-- Main cursor body -->
  <path d="M4 3 L4 19 L8 15 L12 21 L14 20 L10 14 L16 14 Z"
        fill="#ffffff"
        stroke="#333333"
        stroke-width="1.2"
        stroke-linejoin="round"
        stroke-linecap="round"/>
</svg>

