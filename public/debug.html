<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; script-src-attr 'none'; style-src 'self'; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'none';">
    <title>Debug - Pryde Social</title>
    <link rel="stylesheet" href="/debug.css">
</head>
<body>
    <h1>🔍 Pryde Social Debug Page</h1>
    
    <div class="section">
        <h2>Service Worker Status</h2>
        <div id="sw-status">Checking...</div>
        <button id="unregister-sw-button" type="button">Unregister All Service Workers</button>
        <button id="refresh-sw-button" type="button">Refresh Status</button>
    </div>

    <div class="section">
        <h2>Cache Status</h2>
        <div id="cache-status">Checking...</div>
        <button id="clear-caches-button" type="button">Clear All Caches</button>
    </div>

    <div class="section">
        <h2>File Tests</h2>
        <div id="file-tests">Testing...</div>
    </div>

    <div class="section">
        <h2>Actions</h2>
        <button id="full-reset-button" type="button">🔥 FULL RESET (Clear Everything)</button>
        <button id="hard-reload-button" type="button">🔄 Hard Reload</button>
        <button id="go-home-button" type="button">🏠 Go to Home</button>
    </div>

    <script src="/debug.js" defer></script>
</body>
</html>
