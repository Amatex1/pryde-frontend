name: Frontend CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Run Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  build:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build app
        env:
          CI: true
        run: npm run build

  lint-advisory:
    name: Frontend Lint (Advisory)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - id: lint
        name: Run lint
        continue-on-error: true
        run: npm run lint

      - name: Record advisory result
        if: steps.lint.outcome == 'failure'
        run: echo "::warning::Frontend lint backlog remains. This job is advisory until the repo is brought fully lint-clean."

  status-check:
    name: All Required Frontend Checks Passed
    runs-on: ubuntu-latest
    needs: [test, build, lint-advisory]
    if: always()
    env:
      TEST_RESULT: ${{ needs.test.result }}
      BUILD_RESULT: ${{ needs.build.result }}
      LINT_RESULT: ${{ needs.lint-advisory.result }}

    steps:
      - name: Enforce required results
        run: |
          failures=0
          for item in "Run Frontend Tests:$TEST_RESULT" "Build Frontend:$BUILD_RESULT"; do
            name="${item%%:*}"
            result="${item##*:}"
            if [ "$result" != "success" ]; then
              echo "❌ $name did not succeed (result=$result)"
              failures=1
            else
              echo "✅ $name passed"
            fi
          done

          if [ "$LINT_RESULT" != "success" ]; then
            echo "⚠️ Frontend Lint (Advisory) did not pass. Review the lint backlog before treating the branch as fully hardened."
          else
            echo "✅ Frontend Lint (Advisory) passed"
          fi

          if [ "$failures" -ne 0 ]; then
            exit 1
          fi

      - name: Success notification
        run: echo "🎉 Required frontend CI checks passed"